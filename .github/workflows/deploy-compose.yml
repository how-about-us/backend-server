#file: noinspection SpellCheckingInspection
name: Deploy API Server With Docker Compose

on:
  push:
    branches:
      - main
      - feature/ci-cd
    paths:
      - .github/workflows/deploy-compose.yml
      - compose.app.prod.yaml
      - infra/caddy/**
      - src/**
      - build.gradle
      - settings.gradle
      - gradlew
      - gradlew.bat
      - gradle/**
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/how-about-us-backend
  APP_IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/how-about-us-backend
  APP_WAIT_TIMEOUT_SECONDS: 180

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Set app image reference
        id: image
        run: |
          echo "image=$APP_IMAGE_REPOSITORY:$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ./gradlew jib \
            -Djib.to.image="$APP_IMAGE_REPOSITORY" \
            -Djib.to.tags="$GITHUB_SHA" \
            -Djib.to.auth.username="$DOCKERHUB_USERNAME" \
            -Djib.to.auth.password="$DOCKERHUB_TOKEN"

  deploy:
    needs: build
    runs-on: self-hosted
    env:
      APP_IMAGE: ${{ needs.build.outputs.image }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare deployment files
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: |
          mkdir -p "$DEPLOY_PATH/infra/caddy"
          cp compose.app.prod.yaml "$DEPLOY_PATH/compose.app.prod.yaml"
          cp infra/caddy/Caddyfile "$DEPLOY_PATH/infra/caddy/Caddyfile"
          printf '%s\n' "$ENV_PROD" > "$DEPLOY_PATH/.env.prod"
          printf 'APP_IMAGE=%s\n' "$APP_IMAGE" >> "$DEPLOY_PATH/.env.prod"
          chmod 600 "$DEPLOY_PATH/.env.prod"

      - name: Detect caddy-related changes
        id: changed
        shell: bash
        run: |
          needs_caddy_restart=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            needs_caddy_restart=true
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -Eq '^(compose\.app\.prod\.yaml|infra/caddy/Caddyfile)$'; then
              needs_caddy_restart=true
            fi
          fi

          echo "needs_caddy_restart=$needs_caddy_restart" >> "$GITHUB_OUTPUT"

      - name: Deploy app service
        run: |
          cd "$DEPLOY_PATH"
          docker compose --env-file .env.prod -f compose.app.prod.yaml pull app
          docker compose --env-file .env.prod -f compose.app.prod.yaml up -d --wait --wait-timeout "$APP_WAIT_TIMEOUT_SECONDS" app
          docker compose --env-file .env.prod -f compose.app.prod.yaml ps

      - name: Print app logs on deploy failure
        if: failure()
        run: |
          cd "$DEPLOY_PATH"
          docker compose --env-file .env.prod -f compose.app.prod.yaml ps
          docker compose --env-file .env.prod -f compose.app.prod.yaml logs app --tail=200

      - name: Reload caddy when its config changes
        if: steps.changed.outputs.needs_caddy_restart == 'true'
        run: |
          cd "$DEPLOY_PATH"
          docker compose --env-file .env.prod -f compose.app.prod.yaml up -d caddy
          docker compose --env-file .env.prod -f compose.app.prod.yaml ps
