name: Discord PR 알림

on:
  pull_request:
    types: [opened, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 알림 전송
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "PR 올라왔어요!"
          description: |
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.html_url }}
          color: 0x5865F2
          username: GitHub
