#file: noinspection SpellCheckingInspection
spring:
  application:
    name: how-about-us-backend

  jpa:
    open-in-view: false

  threads:
    virtual:
      enabled: true

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    base-url: https://places.googleapis.com
    search-field-mask: places.id,places.displayName,places.formattedAddress,places.location,places.primaryType,places.primaryTypeDisplayName,places.rating,places.userRatingCount,places.photos,places.regularOpeningHours.openNow
    detail-field-mask: id,displayName,formattedAddress,location,primaryType,primaryTypeDisplayName,rating,userRatingCount,nationalPhoneNumber,websiteUri,googleMapsUri,regularOpeningHours,photos.name,reviews

  routes:
    api-key: ${GOOGLE_PLACES_API_KEY}
    base-url: https://routes.googleapis.com
    field-mask: routes.distanceMeters,routes.duration

  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
    token-uri: https://oauth2.googleapis.com/token

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    disable-swagger-default-url: true
    persist-authorization: true
  paths-to-exclude:
    - /springwolf/**

springwolf:
  enabled: true
  docket:
    base-package: com.howaboutus.backend
    info:
      title: 우리어때 웹소켓 API
      version: 1.0.0
      description: WebSocket/STOMP 기반 실시간 이벤트 브로드캐스트 명세
    servers:
      stomp-server:
        protocol: stomp
        host: localhost:8080/ws
  plugin:
    stomp:
      endpoint:
        app: /app

jwt:
  secret: ${JWT_SECRET}
  #개발용, 36시간으로 설정, 나중에 0하나 빼기
  access-token-expiration: 36000000

refresh-token:
  expiration: 1209600000  # 14일 (밀리초)
