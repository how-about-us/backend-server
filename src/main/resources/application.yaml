spring:
  application:
    name: how-about-us-backend

  jpa:
    open-in-view: false

  threads:
    virtual:
      enabled: true

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    base-url: https://places.googleapis.com
    search-field-mask: places.id,places.displayName,places.formattedAddress,places.location,places.primaryType,places.rating,places.photos
    detail-field-mask: id,displayName,formattedAddress,location,primaryType,rating,nationalPhoneNumber,websiteUri,googleMapsUri,regularOpeningHours.weekdayDescriptions,photos.name

  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
    token-uri: https://oauth2.googleapis.com/token

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    disable-swagger-default-url: true
    persist-authorization: true

jwt:
  secret: ${JWT_SECRET}
  #개발용, 36시간으로 설정, 나중에 0하나 빼기
  access-token-expiration: 36000000

refresh-token:
  expiration: 1209600000  # 14일 (밀리초)
